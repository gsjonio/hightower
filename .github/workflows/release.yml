name: Release

# Builds the Windows binary and attaches it to the GitHub release whenever a
# version tag is pushed. Curated release notes are written by the maintainer
# (via `gh release create`); this workflow only builds and uploads the binary,
# creating the release with auto-generated notes if it does not exist yet.
on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-and-upload:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build -p hightower-cli --release
      - name: Package and upload the binary
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $asset = "hightower-$tag-x86_64-pc-windows-msvc.exe"
          Copy-Item target/release/hightower.exe $asset
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --generate-notes
          }
          gh release upload $tag $asset --clobber
