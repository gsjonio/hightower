name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  # Pure domain crate. Runs on both OSes not to claim Linux support (the binary
  # is Windows-only) but as a cheap proof, on a faster runner, that `core` still
  # has no hidden Windows dependency: if someone adds `use windows::...` to the
  # domain, the ubuntu job fails to compile.
  test-core:
    strategy:
      matrix:
        os: [windows-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo test -p hightower-core --verbose

  # The real binary plus its Windows adapters -- Windows only, the single
  # platform where they exist.
  build-cli:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - run: cargo build -p hightower-cli --release
      - run: cargo test -p hightower-adapters --verbose
      - run: cargo test -p hightower-cli --verbose

  fmt:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all -- --check

  clippy:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy
      - run: cargo clippy --workspace --all-targets -- -D warnings

  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: dtolnay/rust-toolchain@stable
      - uses: taiki-e/install-action@cargo-audit
      - run: cargo audit

  # Single required status check for the branch rulesets: green only when every
  # job above is green. Keeps the rich cross-platform matrix (which is what proves
  # `core` stays OS-free) while giving the rulesets one context named exactly
  # `CI` to require. A failure in any dependency skips this job, so the check
  # never reports success and the PR stays blocked.
  CI:
    name: CI
    needs: [test-core, build-cli, fmt, clippy, audit]
    runs-on: ubuntu-latest
    steps:
      - run: echo "all required checks passed"
